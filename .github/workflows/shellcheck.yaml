on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

name: "shellcheck"
permissions: {}

jobs:
  shellcheck:
    name: perform shellcheck analysis
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
      - name: Run ShellCheck
        uses: ludeeus/action-shellcheck@2.0.0

